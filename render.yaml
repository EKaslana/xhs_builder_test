# Render Blueprint — Builder Demo Coach
# Deploys the full Express + SQLite stack on a single Web Service.
# https://render.com/docs/blueprint-spec
#
# Click the "Deploy to Render" button in README.md, or import this repo at
# https://dashboard.render.com/blueprints — Render will read this file and
# create the service automatically.

services:
  - type: web
    name: builder-demo-coach
    runtime: node
    plan: free            # upgrade to "starter" ($7/mo) if you want the
                          # Persistent Disk below (free plan has ephemeral fs)
    region: singapore     # closest to most APAC users; change if desired
    branch: main
    # Render sets NODE_ENV=production for builds, which makes npm skip
    # devDependencies. Our build needs vite / esbuild / tsx / typescript
    # (all dev deps), so override NODE_ENV and pass --include=dev. The
    # explicit `npx --no-install tsx` avoids any PATH edge-cases.
    buildCommand: NODE_ENV=development npm install --include=dev --no-audit --no-fund && npx --no-install tsx script/build.ts
    startCommand: node dist/index.cjs
    autoDeploy: true
    healthCheckPath: /api/meta/agent-mode

    envVars:
      # Pin Node 20 LTS. Required because better-sqlite3@11 has no
      # prebuilt binary for Node 22+ and node-gyp fails to compile it
      # against newer V8 (PropertyCallbackInfo::This was removed).
      - key: NODE_VERSION
        value: 20.20.2
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Where SQLite lives.
      #   - Free plan: leave DATA_DIR unset — data.db lives next to the
      #     server in /opt/render/project/src and is wiped on redeploy.
      #     This is fine for a demo (a clean slate every push).
      #   - Paid plan: attach a Persistent Disk at /var/data via the
      #     Render dashboard (Settings → Disks), then uncomment the line
      #     below so the SQLite file lands on the persistent volume.
      # - key: DATA_DIR
      #   value: /var/data

      # ---- Real LLM (optional) ----------------------------------------
      # Leave these unset to run in pure Mock mode (zero API calls,
      # fully reproducible). Fill them in via the Render dashboard
      # (Environment tab) to switch to Real mode without redeploying code.
      - key: USE_REAL_LLM
        sync: false       # prompt user in dashboard, do not commit value
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false       # e.g. https://api.deepseek.com
      - key: LLM_MODEL
        sync: false       # e.g. deepseek-chat
      - key: LLM_PROVIDER
        sync: false       # optional override; auto-detected from base URL
      - key: LLM_TEMPERATURE
        sync: false
      - key: LLM_TIMEOUT_MS
        sync: false
      - key: LLM_MAX_RETRIES
        sync: false
      - key: LLM_SEED
        sync: false
